  <line x1="377" y1="326" x2="377" y2="336" stroke="#4b5563" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="469" y1="326" x2="469" y2="336" stroke="#4b5563" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="377" y1="336" x2="469" y2="336" stroke="#4b5563" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="407" y1="336" x2="407" y2="346" stroke="#4b5563" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="2 2"/>

