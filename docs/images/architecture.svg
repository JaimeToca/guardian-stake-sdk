  <rect x="610" y="282" width="82" height="44" rx="5" fill="#0c1a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="651" y="300" text-anchor="middle" font-size="9.5" fill="#93c5fd" font-weight="600">Staking</text>
  <text x="651" y="314" text-anchor="middle" font-size="7.5" fill="#3b82f6">pools · APY</text>

  <rect x="702" y="282" width="82" height="44" rx="5" fill="#0c1a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="743" y="300" text-anchor="middle" font-size="9.5" fill="#93c5fd" font-weight="600">Balance</text>
  <text x="743" y="314" text-anchor="middle" font-size="7.5" fill="#3b82f6">ADA · rewards</text>

  <rect x="794" y="282" width="82" height="44" rx="5" fill="#0c1a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="835" y="300" text-anchor="middle" font-size="9.5" fill="#93c5fd" font-weight="600">Fee</text>
  <text x="835" y="314" text-anchor="middle" font-size="7.5" fill="#3b82f6">UTXO estimate</text>

  <rect x="886" y="282" width="82" height="44" rx="5" fill="#0c1a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="927" y="300" text-anchor="middle" font-size="9.5" fill="#93c5fd" font-weight="600">Sign</text>
  <text x="927" y="314" text-anchor="middle" font-size="7.5" fill="#3b82f6">CBOR tx builder</text>

  <rect x="978" y="282" width="82" height="44" rx="5" fill="#0c1a3a" stroke="#3b82f6" stroke-width="1"/>
  <text x="1019" y="300" text-anchor="middle" font-size="9.5" fill="#93c5fd" font-weight="600">Broadcast</text>
  <text x="1019" y="314" text-anchor="middle" font-size="7.5" fill="#3b82f6">tx submit</text>

  <!-- Cardano: all services → BlockfrostRpcClient -->
  <line x1="651" y1="326" x2="651" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="743" y1="326" x2="743" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="835" y1="326" x2="835" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="927" y1="326" x2="927" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="1019" y1="326" x2="1019" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="651" y1="336" x2="1019" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="835" y1="336" x2="835" y2="346" stroke="#4b5563" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Cardano RPC Client -->
  <rect x="695" y="348" width="280" height="40" rx="5" fill="#0c1a3a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="835" y="365" text-anchor="middle" font-size="10" fill="#93c5fd" font-weight="700">BlockfrostRpcClient</text>
  <text x="835" y="379" text-anchor="middle" font-size="8" fill="#3b82f6">axios · Blockfrost REST API</text>

  <!-- Arrow: Cardano RPC → External -->
  <line x1="835" y1="388" x2="835" y2="410" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>

  <!-- ═══════════════════ EXTERNAL LAYER ═══════════════════ -->
  <rect x="20" y="412" width="1060" height="76" rx="8" fill="url(#extGrad)" stroke="#92400e" stroke-width="1"/>
  <rect x="20" y="412" width="3" height="76" rx="2" fill="#f59e0b"/>
  <rect x="32" y="420" width="72" height="18" rx="4" fill="#451a03"/>
  <text x="68" y="433" text-anchor="middle" font-size="10" fill="#fcd34d" font-weight="700" letter-spacing="0.5">EXTERNAL</text>

  <!-- BSC RPC Node -->
  <rect x="53" y="438" width="220" height="38" rx="5" fill="#1c1007" stroke="#b45309" stroke-width="1"/>
  <text x="163" y="454" text-anchor="middle" font-size="10" fill="#fcd34d" font-weight="600">BSC RPC Node</text>
  <text x="163" y="468" text-anchor="middle" font-size="8" fill="#92400e">eth_call · eth_estimateGas · eth_getBalance</text>

  <!-- BNB Chain REST -->
  <rect x="297" y="438" width="220" height="38" rx="5" fill="#1c1007" stroke="#b45309" stroke-width="1"/>
  <text x="407" y="454" text-anchor="middle" font-size="10" fill="#fcd34d" font-weight="600">BNB Chain REST API</text>
  <text x="407" y="468" text-anchor="middle" font-size="8" fill="#92400e">api.bnbchain.org · validator metadata</text>

  <!-- Blockfrost API -->
  <rect x="695" y="438" width="280" height="38" rx="5" fill="#1c1007" stroke="#b45309" stroke-width="1"/>
  <text x="835" y="454" text-anchor="middle" font-size="10" fill="#fcd34d" font-weight="600">Blockfrost API</text>
  <text x="835" y="468" text-anchor="middle" font-size="8" fill="#92400e">pools · accounts · UTXOs · tx submit</text>
</svg>
