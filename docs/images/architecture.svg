  <rect x="53" y="348" width="220" height="40" rx="5" fill="#0a3d3a" stroke="#0f766e" stroke-width="1.5"/>
  <text x="163" y="365" text-anchor="middle" font-size="10" fill="#5eead4" font-weight="700">StakingRpcClient</text>
  <text x="163" y="379" text-anchor="middle" font-size="8" fill="#0d9488">viem multicall · staking contracts</text>

  <rect x="297" y="348" width="220" height="40" rx="5" fill="#0a3d3a" stroke="#0f766e" stroke-width="1.5"/>
  <text x="407" y="365" text-anchor="middle" font-size="10" fill="#5eead4" font-weight="700">BNBRpcClient</text>
  <text x="407" y="379" text-anchor="middle" font-size="8" fill="#0d9488">axios · BNB Chain REST API</text>

  <!-- Arrows: BSC RPC → External -->
  <line x1="163" y1="388" x2="163" y2="410" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>
  <line x1="407" y1="388" x2="407" y2="410" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>

  <!-- ═══════════════════ CARDANO PACKAGE ═══════════════════ -->
  <rect x="570" y="208" width="530" height="186" rx="8" fill="url(#cardanoGrad)" stroke="#1d4ed8" stroke-width="1"/>
  <rect x="570" y="208" width="3" height="186" rx="2" fill="#3b82f6"/>
  <rect x="582" y="216" width="148" height="18" rx="4" fill="#1e3a8a"/>
  <text x="656" y="229" text-anchor="middle" font-size="10" fill="#93c5fd" font-weight="700" letter-spacing="0.5">@guardian-sdk/cardano</text>

