<svg width="1100" height="504" viewBox="0 0 1100 504" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="sdkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bscGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#042f2e" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cardanoGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#0c1a3a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="extGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c1007"/>
      <stop offset="100%" stop-color="#1c1007" stop-opacity="0.5"/>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="504" fill="url(#bg)" rx="12"/>

  <!-- ═══════════════════ APP LAYER ═══════════════════ -->
  <rect x="300" y="16" width="500" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="550" y="36" text-anchor="middle" font-size="10" fill="#8b949e" letter-spacing="1.5">YOUR APPLICATION</text>
  <text x="550" y="54" text-anchor="middle" font-size="13" fill="#e6edf3" font-weight="600">new GuardianSDK([ bsc(…), cardano(…) ])</text>

  <!-- Arrow: App → SDK -->
  <line x1="550" y1="66" x2="550" y2="86" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>

  <!-- ═══════════════════ SDK LAYER ═══════════════════ -->
  <rect x="20" y="88" width="1060" height="100" rx="8" fill="url(#sdkGrad)" stroke="#3730a3" stroke-width="1"/>
  <rect x="20" y="88" width="3" height="100" rx="2" fill="#6366f1"/>
  <rect x="32" y="96" width="140" height="18" rx="4" fill="#312e81"/>
  <text x="102" y="109" text-anchor="middle" font-size="10" fill="#a5b4fc" font-weight="700" letter-spacing="0.5">@guardian-sdk/sdk</text>

  <!-- Card: GuardianSDK -->
  <rect x="60" y="118" width="190" height="58" rx="6" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1"/>
  <text x="155" y="137" text-anchor="middle" font-size="12" fill="#a5b4fc" font-weight="700">GuardianSDK</text>
  <text x="155" y="153" text-anchor="middle" font-size="9" fill="#6366f1">routes calls by chain.id</text>
  <text x="155" y="166" text-anchor="middle" font-size="9" fill="#6366f1">getValidators · sign · broadcast</text>

  <!-- Card: Types & Interfaces -->
  <rect x="455" y="118" width="190" height="58" rx="6" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1"/>
  <text x="550" y="137" text-anchor="middle" font-size="12" fill="#a5b4fc" font-weight="700">Types &amp; Interfaces</text>
  <text x="550" y="153" text-anchor="middle" font-size="9" fill="#6366f1">Validator · Delegation · Balance</text>
  <text x="550" y="166" text-anchor="middle" font-size="9" fill="#6366f1">Fee · Transaction · GuardianChain</text>

  <!-- Card: Errors & Cache -->
  <rect x="850" y="118" width="190" height="58" rx="6" fill="#1e1b4b" stroke="#4f46e5" stroke-width="1"/>
  <text x="945" y="137" text-anchor="middle" font-size="12" fill="#a5b4fc" font-weight="700">Errors &amp; Cache</text>
  <text x="945" y="153" text-anchor="middle" font-size="9" fill="#6366f1">ValidationError · ConfigError</text>
  <text x="945" y="166" text-anchor="middle" font-size="9" fill="#6366f1">SigningError · InMemoryCache</text>

  <!-- Fork arrows: SDK → BSC and Cardano -->
  <line x1="550" y1="188" x2="550" y2="200" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="285" y1="200" x2="835" y2="200" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4 2"/>
  <line x1="285" y1="200" x2="285" y2="208" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>
  <line x1="835" y1="200" x2="835" y2="208" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>
  <text x="556" y="197" font-size="8.5" fill="#6b7280">GuardianServiceContract</text>

  <!-- ═══════════════════ BSC PACKAGE ═══════════════════ -->
  <rect x="20" y="208" width="530" height="186" rx="8" fill="url(#bscGrad)" stroke="#0f766e" stroke-width="1"/>
  <rect x="20" y="208" width="3" height="186" rx="2" fill="#0d9488"/>
  <rect x="32" y="216" width="120" height="18" rx="4" fill="#134e4a"/>
  <text x="92" y="229" text-anchor="middle" font-size="10" fill="#5eead4" font-weight="700" letter-spacing="0.5">@guardian-sdk/bsc</text>

  <!-- bsc() factory -->
  <rect x="185" y="230" width="200" height="38" rx="6" fill="#134e4a" stroke="#0d9488" stroke-width="1"/>
  <text x="285" y="246" text-anchor="middle" font-size="11" fill="#5eead4" font-weight="700">bsc({ rpcUrl })</text>
  <text x="285" y="260" text-anchor="middle" font-size="8.5" fill="#0d9488">creates viem PublicClient · wires services</text>

  <!-- Arrow: factory → services -->
  <line x1="285" y1="268" x2="285" y2="280" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>

