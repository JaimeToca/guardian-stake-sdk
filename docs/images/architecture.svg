  <rect x="60" y="282" width="82" height="44" rx="5" fill="#0a3d3a" stroke="#0d9488" stroke-width="1"/>
  <text x="101" y="300" text-anchor="middle" font-size="9.5" fill="#5eead4" font-weight="600">Staking</text>
  <text x="101" y="314" text-anchor="middle" font-size="7.5" fill="#0d9488">validators · delegations</text>

  <rect x="152" y="282" width="82" height="44" rx="5" fill="#0a3d3a" stroke="#0d9488" stroke-width="1"/>
  <text x="193" y="300" text-anchor="middle" font-size="9.5" fill="#5eead4" font-weight="600">Balance</text>
  <text x="193" y="314" text-anchor="middle" font-size="7.5" fill="#0d9488">avail · staked</text>

  <rect x="244" y="282" width="82" height="44" rx="5" fill="#0a3d3a" stroke="#0d9488" stroke-width="1"/>
  <text x="285" y="300" text-anchor="middle" font-size="9.5" fill="#5eead4" font-weight="600">Fee</text>
  <text x="285" y="314" text-anchor="middle" font-size="7.5" fill="#0d9488">gas estimation</text>

  <rect x="336" y="282" width="82" height="44" rx="5" fill="#0a3d3a" stroke="#0d9488" stroke-width="1"/>
  <text x="377" y="300" text-anchor="middle" font-size="9.5" fill="#5eead4" font-weight="600">Nonce</text>
  <text x="377" y="314" text-anchor="middle" font-size="7.5" fill="#0d9488">tx sequence</text>

  <rect x="428" y="282" width="82" height="44" rx="5" fill="#0a3d3a" stroke="#0d9488" stroke-width="1"/>
  <text x="469" y="300" text-anchor="middle" font-size="9.5" fill="#5eead4" font-weight="600">Sign</text>
  <text x="469" y="314" text-anchor="middle" font-size="7.5" fill="#0d9488">sign · prehash</text>

