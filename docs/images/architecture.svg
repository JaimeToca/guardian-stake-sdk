  <line x1="101" y1="326" x2="101" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="193" y1="326" x2="193" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="101" y1="336" x2="193" y2="336" stroke="#4b5563" stroke-width="1"/>
  <line x1="163" y1="336" x2="163" y2="346" stroke="#4b5563" stroke-width="1" marker-end="url(#arr)"/>

